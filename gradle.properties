## Mod Properties

# Must be lowercase and match the @Mod id.
mod_id=lirikpermadeath

# Human-readable display name.
mod_name=Lirik Permadeath

# License.
mod_license=All Rights Reserved

# Mod version.
mod_version=1.0.0

# Base package for Kotlin sources.
mod_group_id=cl.lirikworks.lirikpermadeath
